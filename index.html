<!doctype html>
<html lang="pt">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Digital Global</title>
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
			html, body { height: 100%; background: #0A0A0A; }
			#root { height: 100%; }
			#splash {
				position: fixed; inset: 0;
				background: #0A0A0A;
				display: flex; flex-direction: column;
				align-items: center; justify-content: center;
				gap: 24px;
				z-index: 9999;
				transition: opacity 0.3s;
			}
			#splash .logo {
				font-size: 22px; font-weight: 900;
				font-family: Arial, sans-serif;
				color: #fff; letter-spacing: -0.5px;
			}
			#splash .logo span { color: #FF6B00; }
			#splash .bar {
				width: 160px; height: 3px;
				background: #1a1a1a; border-radius: 99px; overflow: hidden;
			}
			#splash .bar::after {
				content: '';
				display: block; height: 100%;
				width: 40%; background: #FF6B00; border-radius: 99px;
				animation: slide 1.2s ease-in-out infinite;
			}
			@keyframes slide {
				0%   { transform: translateX(-100%); }
				100% { transform: translateX(400%); }
			}
		</style>
	</head>
	<body>
		<div id="splash">
			<div class="logo">Digital <span>Global</span></div>
			<div class="bar"></div>
		</div>
		<div id="root"></div>
		<script>
			// Remove splash once React mounts
			window.__removeSplash = function() {
				var s = document.getElementById('splash');
				if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 300); }
			};
		</script>
		<script type="module" src="/src/web/main.tsx"></script>
	</body>
</html>
